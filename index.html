<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI 計算機 | 健康小幫手</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="auth-header" id="authHeader">
      <div class="icon">⚖️</div>
      <h1 id="authTitle">BMI 健康計算機</h1>
      <p id="authSubtitle">請登入以開始追蹤你的健康</p>
    </div>

    <div class="user-info-bar" id="userInfoBar">
      <span>👤 <span id="welcomeUser"></span></span>
      <div class="dropdown">
        <button onclick="toggleDropdown()">
          <span>☰</span>
        </button>
        <div class="dropdown-menu" id="dropdownMenu">
          <button onclick="exportCSV()">📤 匯出 CSV</button>
          <button onclick="document.getElementById('csvFileInput').click()">📥 匯入 CSV</button>
          <button onclick="deleteAccount()" class="danger">🗑 刪除帳號</button>
          <button onclick="logout()">🚪 登出</button>
        </div>
      </div>
    </div>

    <div class="auth-form" id="authForm">
      <div class="auth-toggle">
        <button id="tabLogin" class="active" onclick="switchAuthTab('login')">登入</button>
        <button id="tabRegister" onclick="switchAuthTab('register')">註冊</button>
      </div>

      <div class="auth-error" id="authError"></div>
      <div class="auth-success" id="authSuccess"></div>

      <div class="input-group">
        <label>使用者名稱</label>
        <input type="text" id="usernameInput" placeholder="請輸入使用者名稱" autocomplete="username">
      </div>

      <div class="input-group" id="confirmUsernameGroup" style="display:none;">
        <label>確認使用者名稱</label>
        <input type="text" id="confirmUsernameInput" placeholder="請再次輸入使用者名稱" autocomplete="username">
      </div>

      <div class="input-group">
        <label>密碼</label>
        <input type="password" id="passwordInput" placeholder="請輸入密碼" autocomplete="current-password">
      </div>

      <div class="input-group" id="confirmPasswordGroup" style="display:none;">
        <label>確認密碼</label>
        <input type="password" id="confirmPasswordInput" placeholder="請再次輸入密碼" autocomplete="current-password">
      </div>

      <button class="btn-primary" id="authBtn" onclick="handleAuthAction()">登入</button>

      <div class="auth-footer">
        <span id="authFooter"></span><a id="authToggleLink" onclick="switchAuthTab('register')">立即註冊</a>
      </div>
    </div>

    <div class="input-groups" id="calculatorSection" style="display: none;">
      <div class="input-group">
        <label>性別</label>
        <div class="gender-group">
          <button class="gender-btn active" data-gender="male" onclick="selectGender('male')">👨 男性</button>
          <button class="gender-btn" data-gender="female" onclick="selectGender('female')">👩 女性</button>
        </div>
      </div>

      <div class="input-group">
        <label>
          身高
          <span class="display-value"><span id="heightDisplay">170</span> cm</span>
        </label>
        <input type="range" id="heightSlider" min="120" max="220" value="170" oninput="onHeightChange(this.value)">
        <div class="number-input">
          <input type="number" id="heightInput" min="120" max="220" value="170" oninput="onHeightInputChange(this.value)">
        </div>
      </div>

      <div class="input-group">
        <label>
          體重
          <span class="display-value"><span id="weightDisplay">60</span> kg</span>
        </label>
        <input type="range" id="weightSlider" min="25" max="200" value="60" oninput="onWeightChange(this.value)">
        <div class="number-input">
          <input type="number" id="weightInput" min="25" max="200" value="60" oninput="onWeightInputChange(this.value)">
        </div>
      </div>

      <div class="input-group">
        <label>
          年齡
          <span class="display-value"><span id="ageDisplay">25</span> 歲</span>
        </label>
        <input type="range" id="ageSlider" min="5" max="120" value="25" oninput="onAgeChange(this.value)">
        <div class="number-input">
          <input type="number" id="ageInput" min="5" max="120" value="25" oninput="onAgeInputChange(this.value)">
        </div>
      </div>
    </div>

    <button class="btn-calculate" id="calcBtn" onclick="calculateBMI()" style="display: none;">開始計算 BMI</button>

    <div class="result" id="result">
      <div class="result-box" id="resultBox">
        <div class="bmi-value" id="bmiValue">--</div>
        <div class="bmi-label" id="bmiLabel">--</div>
        <div class="bmi-comment" id="bmiComment">--</div>
      </div>
      <div class="gauge">
        <div class="gauge-marker" id="gaugeMarker"></div>
      </div>
      <div class="gauge-labels">
        <span>體重過輕</span>
        <span>正常</span>
        <span>過重</span>
        <span>肥胖</span>
      </div>
    </div>

    <div class="notes-section" id="notesSection" style="display: none;">
      <label>📝 備註紀錄（選填）</label>
      <textarea id="noteInput" placeholder="例如：今天運動後量測、飲食控制Day 1..."></textarea>

      <div class="import-row">
        <label for="csvFileInput">📥 匯入 CSV</label>
        <input type="file" id="csvFileInput" accept=".csv" onchange="importCSV(this)">
        <span class="file-name" id="fileName"></span>
      </div>
    </div>

    <div class="btn-row" id="btnRow" style="display: none;">
      <button class="btn-save" onclick="saveRecord()">💾 儲存本次紀錄</button>
      <button class="btn-delete" onclick="clearAllRecords()" title="清除全部紀錄">🗑️ 全部清除</button>
    </div>

    <div class="history-section" id="historySection" style="display: none;">
      <h2>📊 健康趨勢圖表</h2>
      <div class="chart-wrapper">
        <canvas id="bmiChart"></canvas>
      </div>

      <h2 style="margin-top: 28px;">📋 歷史紀錄</h2>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
